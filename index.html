  S.closing={...coinDef(),...(data.closing||{})};
  S.actual=data.actual!=null?String(data.actual):"";
}

function changeNomCount(saleId,nomId,delta){
  S.sales=S.sales.map(s=>{
    if(s.id!==saleId)return s;
    let noms=[...(s.nominations||[])];
    const idx=noms.findIndex(n=>n.nomId===nomId);
    if(idx>=0){noms[idx]={...noms[idx],count:Math.max(0,noms[idx].count+delta)};if(noms[idx].count===0)noms.splice(idx,1);}
    else if(delta>0){noms.push({nomId,count:1});}
    return{...s,nominations:noms};
  });
  rerender();saveDraft();
}

    return{...st,nominations:noms};
  });
  saveDraft();updateTotals();
}


function changeDrinkCount(staffId,drinkId,delta){
  S.staff=S.staff.map(st=>{

    if(idx>=0){drinks[idx]={...drinks[idx],count:Math.max(0,drinks[idx].count+delta)};if(drinks[idx].count===0)drinks.splice(idx,1);}

  });

}

function updateTotals(){
  try{
    const c=calc();
    // ── 合計欄だけ更新（入力欄は一切触らない）──
    const u=(id,t)=>{const el=document.getElementById(id);if(el&&el.textContent!==t)el.textContent=t;};
    u("_sale-total", yen(c.totalSales));
    u("_stf-total",  yen(c.staffTotal));
    u("_exp-total",  yen(c.expTotal));
    u("_close-total",yen(c.closingTotal));
    u("_coin-section-total",yen(c.closingTotal));
    // 上部サマリーグリッド
    u("_top-sales",  yen(c.totalSales));
    u("_top-staff",  yen(c.staffTotal));
    u("_top-exp",    yen(c.expTotal));

    // ── スタッフ給与明細を更新 ──
    S.staff.forEach(st=>{
      const det=calcStaffPayDetail(st);
      // 明細内訳エリア（IDで特定）
      const breakEl=document.getElementById("pay-break-"+st.id);
      if(breakEl){
        const rate2=S.settings.basePayRate||90;
        const rows=[
          [`基本(×${rate2}%)`,det.base,"var(--sub)"],
          ["指名",det.nomBonus,"var(--accent)"],
          ["DK",det.drinkBonus,"var(--gold)"],
          ["ヘルプ",det.helpBonus,"var(--cyan)"],
          ["BNS",det.bonus,"var(--green)"],
          ["前払",-(det.advance),"var(--red)"],
          ["罰金",-(det.penalty),"var(--red)"],
        ].filter(([,v])=>v!==0);
        breakEl.innerHTML=rows.map(([l,v,col])=>
          `<span style="color:${col};font-size:10px;margin-right:6px">${l} <strong>${v<0?"-"+yen(-v):yen(v)}</strong></span>`
        ).join("");
      }
      u("pay-total-"+st.id, yen(det.handPay));
    });

    // ── 経費の内税表示を更新 ──
    S.exps.forEach(e=>{
      const taxEl=document.getElementById("exp-tax-"+e.id);
      if(!taxEl)return;
      const taxRate=e.taxRate!=null?e.taxRate:10;
      const taxAmt=taxRate>0?Math.floor((e.amount||0)*taxRate/(100+taxRate)):0;
      taxEl.textContent=taxAmt>0?"内税 "+yen(taxAmt):"";
    });

    // ── レジ照合差異ゾーンも更新 ──
    const diffZone=document.getElementById("_diff-zone");
    if(diffZone){
      const diffColor={ne:"var(--primary)",ok:"var(--green)",warn:"var(--gold)",ng:"var(--red)"}[c.diffState];
      diffZone.style.background=c.diffState==="ok"?"rgba(21,151,106,0.08)":c.diffState==="warn"?"rgba(184,136,0,0.08)":c.diffState==="ng"?"rgba(208,58,58,0.08)":"rgba(58,111,232,0.06)";
      diffZone.style.borderColor=diffColor+"44";
      const diffMsgEl=document.getElementById("_diff-msg");
      const diffValEl=document.getElementById("_diff-val");
      if(diffMsgEl)diffMsgEl.style.color=diffColor;
      if(diffMsgEl)diffMsgEl.textContent=c.diff===null?"手元現金を入力":c.diff===0?"一致しています！":Math.abs(c.diff)<=100?"端数誤差の可能性":c.diff>0?"現金が過剰":"現金が不足（要確認）";
      if(diffValEl)diffValEl.textContent=c.diff===null?"—":c.diff===0?"¥ 0":yenD(c.diff);
      if(diffValEl)diffValEl.style.color=diffColor;
    }
    // 理論値
    u("_theory-val", yen(c.expected));
    // ── 固定フッター更新 ──
    const sfTot2=S.staff.reduce((s,st2)=>s+calcStaffPayDetail(st2).handPay,0);
    const diffColor2={ne:"var(--primary)",ok:"var(--green)",warn:"var(--gold)",ng:"var(--red)"}[c.diffState];
    u("_ff-sales", yen(c.totalSales));
    u("_ff-staff", yen(sfTot2));
    const ffDiff=document.getElementById("_ff-diff");
    if(ffDiff){ffDiff.textContent=yenD(c.diff??0);ffDiff.style.color=diffColor2;}
  }catch(e){console.error("updateTotals",e);}
}

function mkSnap(){
  const c=calc();
  // staffEntries方式・旧nominations方式両対応でtotalCommission集計
  const totalCommission=S.sales.reduce((a,sale)=>{
    const entries=getSaleStaffEntries(sale);
    const shares=calcShareAmounts(entries,sale.amount||0);
    return a+entries.reduce((ea,en,ei)=>{
      return ea+(en.nominations||[]).reduce((na,n)=>{
        const nd=S.settings.nominations.find(x=>x.id===n.nomId);
        if(!nd||!n.count)return na;
        const saleAmt=(nd.backBase||"price")==="sale"?shares[ei]:null;
        const msObj=S.masterStaff.find(m=>(m.name||m)===en.staffName);
        return na+calcNomBack({name:en.staffName,nominations:[],drinks:[]},n,nd,msObj,saleAmt);
      },0);
    },0);
  },0);
  return{
    staff:S.staff.map(({id,...s})=>s),
    sales:S.sales.map(({id,...s})=>s),
    exps:S.exps.map(({id,...e})=>e),
    closing:{...S.closing},
    actual:c.hasActual?c.actualNum:null,
    summary:{totalSales:c.totalSales,cashSales:c.cashSales,cardSales:c.cardSales,emonySales:c.emonySales,
      staffTotal:c.staffTotal,expTotal:c.expTotal,changeBase:S.settings.changeBase,
      closingTotal:c.closingTotal,expected:c.expected,diff:c.diff,totalCommission}
  };
}

function importBottleCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result.replace(/^\uFEFF/,"");
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){showToast("❌ データが見つかりません",false);return;}
      const parse=line=>{
        const cols=[];let cur="",inQ=false;
        for(let i=0;i<line.length;i++){
          const ch=line[i];
          if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
          else if(ch===","&&!inQ){cols.push(cur);cur="";}
          else{cur+=ch;}
        }
        cols.push(cur);
        return cols;
      };
      let added=0,updated=0;
      lines.slice(1).forEach(line=>{
        const c=parse(line);
        const name=(c[0]||"").trim();if(!name)return;
        const lastVisit=(c[1]||"").trim();
        const note=(c[2]||"").trim();
        const brand=(c[3]||"").trim();
        const count=parseInt(c[4]||1)||1;
        const openDate=(c[5]||"").trim();
        const remaining=(c[6]||"多").trim();
        let b=(S.bottles||[]).find(x=>x.customerName===name);
        if(!b){
          b={id:nid(),customerName:name,lastVisit,note,items:[]};
          S.bottles=[...(S.bottles||[]),b];
          added++;
        } else {
          if(lastVisit)b.lastVisit=lastVisit;
          if(note)b.note=note;
        }
        if(brand){
          b.items=[...(b.items||[]),{id:nid(),brand,count,openDate,remaining}];
          updated++;
        }
        S.bottles=(S.bottles||[]).map(x=>x.customerName===name?b:x);
      });
      S.bottles=sortBottles(S.bottles);
      LS.set("ks_bottles",S.bottles);
      S.bottleListOpen=true;
      showToast("📥 "+added+"名追加 / "+updated+"本登録");
      rerender();
    }catch(e){showToast("❌ 読み込みエラー: "+e.message,false);}
    input.value="";
  };
  reader.readAsText(file,"UTF-8");
}

  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.getElementById("dl-link");a.href=url;a.download="shiro_backup_"+today()+".json";a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast("📤 バックアップを保存しました（"+Object.keys(S.allData).length+"件）");
}
document.addEventListener("DOMContentLoaded",()=>{
  document.addEventListener("change",e=>{
    if(e.target.id!=="import-input")return;
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const cnt=Object.keys(data.allData||{}).length;
        if(!cnt&&!data.masterStaff){showToast("❌ 有効なバックアップファイルではありません",false);return;}
        S.importPending={data,cnt};rerender();
      }catch(e){showToast("❌ JSONが無効です",false);}
    };
    reader.readAsText(file,"UTF-8");e.target.value="";
  });
  init();
});

// 総合レポート生成
// ═══════════════════════════════════════
function generateFullReport(){
  // ── データ収集 ──────────────────────────────
  const period = S.period||"month";
  const cs = S.customStart||"", ce = S.customEnd||"";
  const st = getStats(period, cs, ce);
  const rankSt = getStats(S.rankPeriod||"month","","");
  const perfResult = calcStaffPerformance(S.perfPeriod||"month");
  const perf = perfResult.data;
  const shopTotal = perfResult.shopTotalSales;
  const perfNames = Object.keys(perf).sort((a,b)=>perf[b].sales-perf[a].sales);

  // シフト
  const now2 = new Date();
  const sy = S.shiftMonth ? S.shiftMonth.y : now2.getFullYear();
  const sm2 = S.shiftMonth ? S.shiftMonth.m : now2.getMonth();
  const shiftSummary = {};
  Object.entries(S.allData).forEach(([d,dd])=>{
    const dt=new Date(d+"T00:00:00");
    if(dt.getFullYear()===sy&&dt.getMonth()===sm2){
      (dd.staff||[]).forEach(s=>{
        if(!s.name)return;
        if(!shiftSummary[s.name])shiftSummary[s.name]={days:0,hours:0,pay:0};
        shiftSummary[s.name].days++;
        shiftSummary[s.name].hours+=s.hours||0;
        shiftSummary[s.name].pay+=calcStaffPay(s);
      });
    }
  });
  const shiftEntries = Object.entries(shiftSummary).sort((a,b)=>b[1].days-a[1].days);

  // ── ヘルパー（レポート内で安全に使う） ──────────
  const rYen = n => "¥" + Math.round(Math.abs(n||0)).toLocaleString("ja-JP");
  const rEsc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const periodLabel = {month:"今月",prev:"先月",week:"直近7日",custom:"期間指定"}[period]||"期間";
  const rankLabel = {month:"今月",prev:"先月"}[S.rankPeriod||"month"]||"今月";
  const perfLabel = {month:"今月",prev:"先月",week:"直近7日"}[S.perfPeriod||"month"]||"今月";
  const generatedAt = new Date().toLocaleString("ja-JP");
  const shopName = rEsc(S.settings.shopName||"店舗");

  // ── SVGバーチャート生成 ─────────────────────────
  function makeBars(data, maxVal, color1="#4CAF50", color2="#e0e0e0"){
    if(!data.length) return "<p style='color:#999;font-size:11px'>データなし</p>";
    const W=320, H=80, pad=4, bw=Math.max(3, Math.floor((W-pad*2)/data.length)-1);
    let bars="", labels="";
    data.forEach((item,i)=>{
      const h = maxVal>0 ? Math.max(2, Math.round(item.v/maxVal*(H-18))) : 2;
      const x = pad + i*(bw+1);
      const y = H-18-h;
      const col = item.today ? "#3a6fe8" : item.v>0 ? color1 : color2;
      bars += `<rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${col}" rx="1"/>`;
      if(data.length<=20){
        labels += `<text x="${x+bw/2}" y="${H-2}" text-anchor="middle" font-size="7" fill="#999">${item.label}</text>`;
      }
    });
    return `<svg width="${W}" height="${H}" style="display:block">${bars}${labels}</svg>`;
  }

  // ── セクション共通スタイル ──────────────────────
  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f2f7;color:#1a2240;font-size:13px;}

    .cover-title{font-size:32px;font-weight:900;letter-spacing:.1em;margin-bottom:8px;}
    .cover-sub{font-size:14px;opacity:.7;letter-spacing:.05em;}
    .cover-meta{margin-top:24px;display:flex;gap:24px;flex-wrap:wrap;}
    .cover-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 16px;font-size:12px;}
    .cover-chip strong{display:block;font-size:16px;font-weight:800;}
    .section{padding:28px 36px 20px;border-bottom:1px solid #eee;}

    .kpi-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}

    .kpi-val.blue{color:#3a6fe8;}
    .kpi-val.red{color:#d03a3a;}
    .kpi-val.purple{color:#6840cc;}
    .kpi-val.cyan{color:#0a8fc4;}
    .kpi-val.gold{color:#c8820a;}
    table{width:100%;border-collapse:collapse;font-size:12px;}

    .rank-2{background:linear-gradient(135deg,#7a8599,#aab0be);}
    .rank-3{background:linear-gradient(135deg,#b06030,#d08050);}
    .rank-n{background:#d0d4e0;}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .bar-track{flex:1;background:#e8eaf2;border-radius:3px;height:10px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:3px;}
    .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
    .tag-green{background:#e8f8f0;color:#15976a;}
    .tag-red{background:#fff0f0;color:#d03a3a;}
    .tag-blue{background:#eef2ff;color:#3a6fe8;}
    .tag-cyan{background:#e8f5fb;color:#0a8fc4;}
    .staff-card{background:#f8f9fc;border:1px solid #e8eaf2;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
    .staff-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .staff-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
    .nom-bar{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11px;}
    .footer-area{background:#f8f9fc;border-top:2px solid #e8eaf2;padding:16px 36px;font-size:10px;color:#9aa4b8;display:flex;justify-content:space-between;}
    @media print{
      body{background:#fff;}
      .page{width:100%;margin:0;box-shadow:none;}
      .section{page-break-inside:avoid;}
      .sec-title{page-break-after:avoid;}
    }
  `;

  // ── 各セクションHTML生成 ──────────────────────

  // ① カバー
  const {s0,e0}=getPeriodRange(period,cs,ce);
  const coverHtml = `
<div class="cover">
  <div class="cover-title">📊 ${shopName}</div>
  <div class="cover-sub">総合管理レポート</div>
  <div class="cover-meta">
    <div class="cover-chip"><span>集計期間</span><strong>${s0||"—"} 〜 ${e0||"—"}</strong></div>

</div>`;

  // ② 売上集計セクション
  let statsHtml = "";

    if(st.douhanTotal>0||st.douhanTotalCount>0){

  <div class="kpi cyan"><div class="kpi-label">同伴件数</div><div class="kpi-val cyan">${st.douhanTotalCount||0}件</div></div>

    // 売上推移バーチャート

      const barData = st.recent.map(([d2,dd])=>{

      statsHtml += `<div style="margin-bottom:14px;">

    // 指名・ドリンク内訳
    const nomEntries = Object.entries(st.nomMap);

    if(nomEntries.length){

  <div style="font-size:11px;font-weight:700;color:#5a6580;margin-bottom:6px;">👆 指名種別内訳</div>

      (d.staff||[]).forEach(s=>{if(!s.name)return;if(!drinkRankMap[s.name])drinkRankMap[s.name]=0;(s.drinks||[]).forEach(dk=>drinkRankMap[s.name]+=dk.count||0);});

    const drinkE = Object.entries(drinkRankMap).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0);

    const mkRankTable=(title, rows, cols) => {
      if(!rows.length) return "";
      return `<div style="margin-bottom:16px">

${drinkE.length?mkRankTable("🥂 ドリンクバックランキング", drinkE.map(([n,v])=>`<td style="font-weight:700">${rEsc(n)}</td><td style="text-align:right;font-weight:800">${v}杯</td>`), [{label:""},{label:"名前"},{label:"杯数",right:true}]):""}
</div>`;
  } else {
    rankHtml = `<div class="section"><div class="sec-title gold">🏆 ランキング</div><p style="color:#999">データなし</p></div>`;
  }

  // ④ 成績セクション
  let perfHtml = `<div class="section"><div class="sec-title purple">🌸 スタッフ成績　<small style="font-size:12px;font-weight:600;color:#666">${perfLabel}</small></div>`;
  if(perfNames.length){

    perfHtml += `<div style="margin-bottom:16px;">

  w.document.open();

}

  // ① 給与明細
  const payslipCard=`<div class="card" style="margin-bottom:12px">
    <div class="card-hd">
      <div class="card-hd-title">💳 給与明細</div>
      <span style="font-size:10px;color:var(--muted)">月払い精算用</span>
    </div>
    <div class="card-bd">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">スタッフ個別の月間給与明細をPDFで出力します</div>
      <label class="lbl">スタッフ選択</label>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${staffPillsSingle('payslipStaff')}</div>
      <label class="lbl">対象月</label>
      <select onchange="const[y2,m2]=this.value.split('-');S.payslipYear=+y2;S.payslipMonth=+m2;rerender()" style="width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-weight:700;margin-bottom:12px">
        ${monthOpts.map(o=>`<option value="${o.y}-${o.m}" ${S.payslipYear===o.y&&S.payslipMonth===o.m?'selected':''}>${o.label}</option>`).join('')}
      </select>
      <button onclick="generatePayslip('${esc(S.payslipStaff||'').replace(/'/g,"\\'")}',${S.payslipYear||now2.getFullYear()},${S.payslipMonth!=null?S.payslipMonth:now2.getMonth()})" style="width:100%;padding:13px;background:linear-gradient(135deg,#6840cc,#3a6fe8);border:none;border-radius:12px;color:#fff;font-weight:800;font-size:14px;cursor:pointer">
        💳 ${esc(S.payslipStaff||'')} の給与明細を出力
      </button>
    </div>
  </div>`;

  // ② 個人成績レポート
  const perfCard=`<div class="card" style="margin-bottom:12px">
    <div class="card-hd">
      <div class="card-hd-title">📊 個人成績レポート</div>
      <span style="font-size:10px;color:var(--muted)">売上・指名・同伴・出勤詳細</span>
    </div>
    <div class="card-bd">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">担当売上・指名・同伴・ドリンク・出勤日別明細をまとめてPDF出力</div>
      <label class="lbl">スタッフ選択</label>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${staffPillsSingle('repStaffTarget')}</div>
      <label class="lbl">対象期間</label>
      <div style="display:flex;gap:4px;margin-bottom:12px;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--border)">${periodBar}</div>
      <button onclick="generateStaffPerfReport('${esc(S.repStaffTarget||'').replace(/'/g,"\\'")}','${S.perfPeriod||'month'}')" style="width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-weight:800;font-size:14px;cursor:pointer">
        📊 ${esc(S.repStaffTarget||'')} の成績レポートを出力
      </button>
    </div>
  </div>`;

  // ③ 全員一括レポート
  const allCard=`<div class="card">
    <div class="card-hd">
      <div class="card-hd-title">📋 全員成績レポート</div>
      <span style="font-size:10px;color:var(--muted)">一括出力</span>
    </div>
    <div class="card-bd">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${staffNames.length}名全員分の成績レポートを1つのPDFにまとめて出力します（1人1ページ）</div>
      <label class="lbl">対象期間</label>
      <div style="display:flex;gap:4px;margin-bottom:12px;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--border)">${periodBar}</div>
      <button onclick="generateAllStaffReport('${S.perfPeriod||'month'}')" style="width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#0a8a4a);border:none;border-radius:12px;color:#fff;font-weight:800;font-size:14px;cursor:pointer">

  return headerCard+payslipCard+perfCard+allCard;

async function doImport(){
  if(!S.importPending)return;
  const d=S.importPending.data;
  if(d.allData)S.allData={...S.allData,...d.allData};
  if(d.masterStaff){
    const imported=d.masterStaff.map((m,i)=>{
      if(typeof m==="string")return{id:nid(),name:m,hourlyRate:0,status:"active",nomRate:null,minDays:0,color:"#C0406A",note:"",joinDate:"",targetMonthlySales:0};
      return m;
    });
    // Merge without duplication by name
    const existing=new Set(S.masterStaff.map(m=>m.name||m));
    const newOnes=imported.filter(m=>!existing.has(m.name||m));
    S.masterStaff=[...S.masterStaff,...newOnes];
  }
  if(d.customers)S.customers=[...S.customers,...d.customers.filter(c=>!S.customers.find(x=>x.id===c.id))];
  if(d.settings)S.settings={...S.settings,...d.settings};
  if(d.bottles)S.bottles=sortBottles([...S.bottles,...d.bottles.filter(b=>!S.bottles.find(x=>x.id===b.id))]);
  if(d.arrears)S.arrears=[...S.arrears,...d.arrears.filter(a=>!S.arrears.find(x=>x.id===a.id))];
  if(d.shiftPlan)S.shiftPlan={...S.shiftPlan,...d.shiftPlan};LS.set("ks_shiftplan",S.shiftPlan);
  LS.set("ks_alldata",S.allData);LS.set("ks_master",S.masterStaff);
  LS.set("ks_customers",S.customers);LS.set("ks_settings",S.settings);
  LS.set("ks_bottles",S.bottles);LS.set("ks_arrears",S.arrears);
  showToast(`📥 ${S.importPending.cnt}件をインポートしました`);
  S.importPending=null;applyTheme();rerender();
}

const DPI=2.5,CW=595*DPI,CM=36*DPI,LH=23*DPI;
const FONT="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo',sans-serif";
function copyLineReport(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      showToast("📋 コピーしました！LINEに貼り付けてください");
      S.showLineReport=false;rerender();
    }).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta=document.createElement("textarea");
  ta.value=text;ta.style.cssText="position:fixed;left:-9999px;top:-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");showToast("📋 コピーしました！");S.showLineReport=false;rerender();}
  catch(e){showToast("❌ コピー失敗",false);}
  document.body.removeChild(ta);
}

function checkBottleAlert(name){
  if(!name||name.length<2)return;
  const q=name.toLowerCase();
  const b=(S.bottles||[]).find(x=>(x.customerName||'').toLowerCase().includes(q));
  if(!b)return;
  const items=(b.items||[]).filter(x=>x.remaining!=="空");
  if(!items.length)return;

  const existing=document.getElementById('_bottle-toast');
  if(existing)existing.remove();
  clearTimeout(window._bottleToastTimer);

  // 残量カラー
  const remColor=(rem)=>{
    if(rem==='多')return'#15976A';
    if(rem==='中')return'#3A6FE8';
    if(rem==='少')return'#B88800';
    return'#9AA4CC';
  };

  const itemsHtml=items.map(it=>{
    const col=remColor(it.remaining||'多');
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.08);">
      <span style="font-size:13px;font-weight:700;color:#fff">${esc(it.brand||'銘柄不明')}</span>
      <span style="font-size:11px;font-weight:800;background:${col}33;color:${col};border-radius:6px;padding:2px 9px;border:1px solid ${col}55">残 ${it.remaining||'多'}</span>
    </div>`;
  }).join('');

  const el=document.createElement('div');
  el.id='_bottle-toast';
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.92);z-index:9999;width:88%;max-width:320px;background:rgba(15,18,32,.97);border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.6);border:1.5px solid rgba(184,136,0,.4);overflow:hidden;opacity:0;transition:opacity .2s,transform .2s;';

  el.innerHTML=
    // ヘッダー
    '<div style="background:linear-gradient(135deg,rgba(184,136,0,.25),rgba(184,136,0,.08));padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;">'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="font-size:22px">🍾</span>'
        +'<div>'
          +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.06em">ボトルキープあり</div>'
          +'<div style="font-size:16px;font-weight:900;color:#fff">'+esc(b.customerName)+'</div>'
        +'</div>'
      +'</div>'
      +'<button onclick="document.getElementById(\'_bottle-toast\').remove()" style="background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">×</button>'
    +'</div>'
    // ボトル一覧
    +'<div>'+itemsHtml+'</div>'
    // フッター
    +'<div style="padding:8px 12px;text-align:center;font-size:10px;color:rgba(255,255,255,.35)">タップで閉じる　／　8秒後に自動で消えます</div>';

  el.addEventListener('click',()=>el.remove());
  document.body.appendChild(el);

  // アニメーション
  requestAnimationFrame(()=>{
    el.style.opacity='1';
    el.style.transform='translate(-50%,-50%) scale(1)';
  });

  // 8秒後にフェードアウト
  window._bottleToastTimer=setTimeout(()=>{
    if(!el.parentNode)return;
    el.style.opacity='0';
    el.style.transform='translate(-50%,-50%) scale(.95)';
    setTimeout(()=>el.remove(),300);
  },8000);
}
function showToast(msg,ok=true){
  clearTimeout(_toastT);clearInterval(_toastP);
  const el=document.getElementById("toast"),ml=document.getElementById("toast-msg"),pg=document.getElementById("toast-prog");
  el.style.background=ok?"#EDFAF4":"#FFF0F0";
  el.style.border=`1.5px solid ${ok?"#15976A55":"#D03A3A55"}`;
  el.style.color=ok?"#15976A":"#D03A3A";
  if(pg)pg.style.background=ok?"#15976A":"#D03A3A";
  ml.textContent=msg;if(pg)pg.style.width="100%";
  el.classList.add("show");
  let p=100;_toastP=setInterval(()=>{p-=4;if(p<=0)clearInterval(_toastP);if(pg)pg.style.width=Math.max(0,p)+"%";},100);
  _toastT=setTimeout(()=>el.classList.remove("show"),2600);
}



function loadDayData(d){
  const dd=S.allData[d];
  if(!dd){showToast("データなし",false);return;}
  if(!confirm(jpDate(d)+"のデータを読み込みますか?\n現在の入力内容は上書きされます。")){return;}
  S.date=d;
  applyDay(dd);
  S.tab="r";
  showToast("📅 "+jpDate(d)+"を読み込みました");
  rerender();
}
function deleteDayData(d){
  if(!confirm(jpDate(d)+"のデータを削除しますか?\nこの操作は取り消せません。")){return;}
  delete S.allData[d];
  LS.set("ks_alldata",S.allData);
  showToast("🗑️ "+jpDate(d)+"を削除しました");
  rerender();
}

async function init(){
  try{
    const allData=LS.get("ks_alldata");
    const master=LS.get("ks_master");
    const pin=LS.get("ks_pin");
    const settings=LS.get("ks_settings");
    const draft=LS.get("ks_draft");
    const bottles=LS.get("ks_bottles");
    const arrears=LS.get("ks_arrears");
    const shiftPlan=LS.get("ks_shiftplan");
    const customersData=LS.get("ks_customers");

    if(allData)S.allData=allData;
    if(shiftPlan)S.shiftPlan=shiftPlan;
    if(customersData)S.customers=customersData;
    if(master){
      // Migration: convert string array to object array if needed
      S.masterStaff=master.map((m,i)=>{
        if(typeof m==="string")return{id:"ms_"+i,name:m,hourlyRate:0,status:"active",nomRate:null,minDays:0,color:"#C0406A",note:"",joinDate:"",targetMonthlySales:0};
        return m;
      });
    }
    if(pin)S.pin=pin;
    if(settings)S.settings={...DEFAULT_SETTINGS,...settings,darkMode:settings.darkMode??false};
    if(bottles)S.bottles=bottles;
    if(arrears)S.arrears=arrears;

    S.mode=S.pin?"select":"owner";

    if(draft&&draft.date){
      S.date=draft.date;
      S.staff=(draft.staff||[]).map(s=>({...s,id:nid()}));
      S.sales=(draft.sales||[]).map(s=>({...s,id:nid()}));
      S.exps=(draft.exps||[]).map(e=>({...e,id:nid()}));
      S.closing={...coinDef(),...(draft.closing||{})};
      S.actual=draft.actual!=null?String(draft.actual):"";
    } else {
      const day=S.allData[S.date];
      if(day)applyDay(day);
    }

    // Init customStart/End
    S.customStart=S.reportCustomStart=today();
    S.customEnd=S.reportCustomEnd=today();

  }catch(e){
    console.error("init error",e);
    S.mode="owner";
  }

  document.getElementById("loading-screen").style.display="none";
  render();
  _syncTabBarTop();
}
